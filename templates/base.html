{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Solar Detection{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">

</head>

<body style="margin: 0; font-family: system-ui, -apple-system, sans-serif; background: #f3f4f6;">

    {% if user.is_authenticated %}
    {% include 'navbar.html' %}
    {% endif %}

    <main>
        {% block content %}
        {% endblock %}
    </main>

</body>

</html>
