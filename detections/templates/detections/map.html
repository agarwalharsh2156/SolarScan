{% extends 'base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<div class="container-wrapper">
    <!-- Header -->
    <div style="margin-bottom: 2rem;">
        <h1 style="font-size: 2.5rem; color: #111827; margin: 0 0 0.5rem 0; font-weight: 800;">Solar Detection Analysis
        </h1>
        <p style="color: #6b7280; font-size: 1rem; margin: 0;">Search for an address or click on the map to analyze
            satellite imagery</p>
    </div>

    <!-- Search Section -->
    <div class="search-section">
        <input type="text" id="address-search" placeholder="Enter address (e.g., New York, USA)...">
        <button onclick="searchAddress()" class="btn-submit">Search</button>
    </div>

    <!-- Map -->
    <div class="map-container" id="map"></div>

    <!-- Analysis Section -->
    <div class="analysis-section">
        <!-- Image with Bounding Boxes -->
        <div class="image-box">
            <div class="controls-section">
                <button class="toggle-btn" id="toggle-boxes" onclick="toggleBoundingBoxes()">
                    <i class="bi bi-eye"></i>
                    <span>Show Detections</span>
                </button>
            </div>
            <div id="satellite-img-container">
                <img id="satellite-img" src="" alt="Satellite Image">
                <canvas id="bounding-box-canvas"></canvas>
            </div>
            <div class="no-results" id="no-analysis-msg" style="display: none;">
                <i class="bi bi-info-circle"
                    style="font-size: 2rem; color: #d1d5db; display: block; margin-bottom: 1rem;"></i>
                <p>Click on the map or search an address to analyze</p>
            </div>
        </div>

        <!-- Results Cards -->
        <div class="image-box">
            <div class="controls-section" style="border-bottom: none;">
                <h3 style="margin: 0; color: #111827; font-weight: 700;">Analysis Results</h3>
            </div>
            <div id="results-content">
                <div class="no-results">
                    <i class="bi bi-graph-up" style="font-size: 2rem; color: #d1d5db; display: block; margin-bottom: 1rem;"></i>
                    <p>Results will appear here</p>
                </div>
            </div>
            <button id="analyze-btn" class="btn-submit" style="margin: 1.5rem; width: calc(100% - 3rem); display: none;"
                disabled>
                Analyze Selected Location
            </button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="{% static 'map.js' %}"></script>
{% csrf_token %}
{% endblock %}
